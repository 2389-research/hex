# ABOUTME: Deploy landing page to Firebase Hosting
# ABOUTME: Triggers on changes to landing-page directory

name: Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      - 'landing-page/**'
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'landing-page/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing-page
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing-page/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase (PR preview)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HEX }}
          projectId: hex-code-daf69
          entryPoint: landing-page
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Deploy to Firebase (production)
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HEX }}
          channelId: live
          projectId: hex-code-daf69
          entryPoint: landing-page
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
