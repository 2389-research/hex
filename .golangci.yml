version: "2"
linters:
  enable:
    - bodyclose
    - copyloopvar
    - misspell
    - unconvert
  disable:
    - gosec
    - prealloc
    - revive
    - unparam
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    gosec:
      excludes:
        - G104
        - G304
        - G302
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: var-naming
          severity: warning
        - name: unexported-return
          severity: warning
    staticcheck:
      checks:
        - all
        - -QF1003
        - -QF1012
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - unparam
        path: _test\.go
      - linters:
          - all
        path: vendor/
      - linters:
          - revive
        text: package-comments
      - linters:
          - revive
        text: exported.*should have comment
      - linters:
          - revive
        text: stutters
      - linters:
          - revive
        text: unused-parameter
      - linters:
          - gosec
        text: G304
      - linters:
          - gosec
        text: G302
      - linters:
          - prealloc
        text: Consider pre-allocating
      - linters:
          - staticcheck
        text: QF1012.*Use fmt.Fprintf
      - linters:
          - staticcheck
        text: QF1003
      - linters:
          - unparam
        text: result.*is always nil
      - linters:
          - revive
        text: redefines-builtin-id
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
