version: 2

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck       # Check for unchecked errors
    - govet          # Vet examines Go source code
    - ineffassign    # Detect ineffectual assignments
    - staticcheck    # Staticcheck is go vet on steroids
    - unused         # Check for unused constants, variables, functions and types
    - misspell       # Finds commonly misspelled English words
    - revive         # Fast, configurable, extensible, flexible linter
    - bodyclose      # Check whether HTTP response body is closed
    - gosec          # Security problems
    - unconvert      # Remove unnecessary type conversions
    - unparam        # Report unused function parameters
    - prealloc       # Find slice declarations that could be preallocated
    - copyloopvar    # Check for pointers to enclosing loop variables (replaces exportloopref)

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    check-shadowing: true
    enable-all: true

  revive:
    rules:
      - name: var-naming
        severity: warning
        disabled: false
      - name: unexported-return
        severity: warning
        disabled: false
      - name: exported
        severity: warning
        disabled: true  # Disabled - interface methods don't need individual comments

  gosec:
    excludes:
      - G104  # Audit errors not checked (covered by errcheck)

issues:
  exclude-rules:
    # Exclude test files from certain linters
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam

    # Exclude productivity tool files from revive (Tool interface methods don't need individual comments)
    - path: internal/tools/email_tools\.go
      linters:
        - revive
    - path: internal/tools/calendar_tools\.go
      linters:
        - revive
    - path: internal/tools/task_tools\.go
      linters:
        - revive

    # Exclude generated files
    - path: (^|\/)vendor\/
      linters:
        - all

  max-issues-per-linter: 0
  max-same-issues: 0

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
